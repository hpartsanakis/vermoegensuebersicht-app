<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cashflow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html">Vermögensübersicht</a>
      <nav class="nav" aria-label="Hauptnavigation">
        <a href="index.html">Dashboard</a><a href="assets.html">Vermögen</a
        ><a href="debts.html">Schulden</a
        ><a class="active" href="cashflow.html">Cashflow</a
        ><a href="reports.html">Auswertung</a><a href="settings.html">Export</a>
      </nav>
    </header>
    <main class="page">
      <section class="page-title">
        <div>
          <p class="eyebrow">Monatlich</p>
          <h1>Einnahmen und Ausgaben</h1>
        </div>
      </section>
      <section class="metric-grid compact">
        <article class="metric">
          <span>Einnahmen</span><strong data-total-income>0 EUR</strong>
        </article>
        <article class="metric">
          <span>Ausgaben</span><strong data-total-expenses>0 EUR</strong>
        </article>
        <article class="metric accent">
          <span>Monatsüberschuss</span><strong data-surplus>0 EUR</strong>
        </article>
        <article class="metric">
          <span>Sparquote</span><strong data-savings-rate>0 %</strong>
        </article>
      </section>
      <section class="two-columns">
        <form class="panel form-grid" data-income-form>
          <input type="hidden" name="id" />
          <h2>Einnahme</h2>
          <label>Name<input name="name" required /></label
          ><label
            >Kategorie<select
              name="category"
              data-income-categories
            ></select></label
          ><label
            >Betrag<input
              name="amount"
              type="number"
              step="0.01"
              min="0"
              required /></label
          ><button class="primary" type="submit">Speichern</button>
        </form>
        <form class="panel form-grid" data-expense-form>
          <input type="hidden" name="id" />
          <h2>Ausgabe</h2>
          <label>Name<input name="name" required /></label
          ><label
            >Kategorie<select
              name="category"
              data-expense-categories
            ></select></label
          ><label
            >Betrag<input
              name="amount"
              type="number"
              step="0.01"
              min="0"
              required /></label
          ><button class="primary" type="submit">Speichern</button>
        </form>
      </section>
      <section class="two-columns">
        <div class="panel">
          <div class="panel-head">
            <h2>Einnahmen</h2>
            <span data-total-income>0 EUR</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Kategorie</th>
                  <th class="right">Betrag</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-income-table></tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <h2>Ausgaben</h2>
            <span data-total-expenses>0 EUR</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Kategorie</th>
                  <th class="right">Betrag</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-expenses-table></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
