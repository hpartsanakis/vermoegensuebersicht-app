<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vermögen</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#126c57" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Vermögen" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html">Vermögensübersicht</a>
      <nav class="nav" aria-label="Hauptnavigation">
        <a href="index.html">Dashboard</a
        ><a class="active" href="assets.html">Vermögen</a
        ><a href="debts.html">Schulden</a><a href="cashflow.html">Cashflow</a
        ><a href="reports.html">Auswertung</a><a href="settings.html">Export</a>
      </nav>
    </header>
    <main class="page">
      <section class="page-title">
        <div>
          <p class="eyebrow">Bestand</p>
          <h1>Vermögenswerte</h1>
        </div>
      </section>
      <section class="editor-layout">
        <form class="panel form-grid" data-asset-form>
          <input type="hidden" name="id" /><label
            >Name<input name="name" required /></label
          ><label
            >Kategorie<select
              name="category"
              required
              data-asset-categories
            ></select></label
          ><label
            >Aktueller Wert<input
              name="value"
              type="number"
              step="0.01"
              min="0"
              required /></label
          ><label
            >Datum der Bewertung<input
              name="valuationDate"
              type="date" /></label
          ><label
            >Dokument / Vertrag<input
              name="document"
              placeholder="Dateiname oder Ablageort" /></label
          ><label class="wide"
            >Notizen<textarea name="notes" rows="4"></textarea></label
          ><button class="primary" type="submit">Speichern</button
          ><button class="ghost" type="reset">Neu</button>
        </form>
        <section class="panel">
          <div class="panel-head">
            <h2>Alle Vermögenswerte</h2>
            <strong data-total-assets>0 EUR</strong>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Kategorie</th>
                  <th>Bewertung</th>
                  <th class="right">Wert</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-assets-table></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
